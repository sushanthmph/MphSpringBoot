# ========== APPLICATION INFORMATION ==========
spring.application.name=tradefileprocessingandmanagementservice

# ========== SERVER CONFIGURATION ==========
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ========== DATABASE CONFIGURATION - PostgreSQL ==========
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/transaction
spring.datasource.username=postgres
spring.datasource.password=postgres

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ========== JPA/HIBERNATE CONFIGURATION ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# ========== FILE UPLOAD CONFIGURATION ==========
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== SPRING BATCH CONFIGURATION ==========
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ========== SWAGGER/OPENAPI CONFIGURATION ==========
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ========== LOGGING CONFIGURATION ==========
logging.level.root=INFO
logging.level.com.mphasis.tfp=INFO
logging.level.com.mphasis.tfp.batch.processor.JobProcessing=DEBUG
logging.level.com.mphasis.tfp.validation.TransactionValidator=DEBUG
logging.level.com.mphasis.tfp.servicesimpl=DEBUG
logging.level.org.springframework.batch=WARN
logging.level.org.hibernate.SQL=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n
logging.file.name=logs/trade-file-processing.log
logging.file.max-size=50MB
logging.file.max-history=30

# ========== APPLICATION SPECIFIC PROPERTIES ==========
app.file.max-size=10485760
app.file.max-size-mb=10
app.file.allowed-extensions=txt,csv
app.file.allow-duplicate=true
app.file.delimiter=,

app.batch.chunk-size=100
app.batch.skip-limit=10
app.batch.thread-pool-size=5
app.batch.enable-async=true

app.transaction.field.transaction-id-index=0
app.transaction.field.file-header-date-index=1
app.transaction.field.account-number-index=2
app.transaction.field.transaction-type-index=3
app.transaction.field.batch-location-index=4
app.transaction.field.batch-number-index=5
app.transaction.field.update-batch-date-index=6
app.transaction.field.action-name-index=7
app.transaction.field.related-file-key-index=8
app.transaction.field.do-not-report-flag-index=9
app.transaction.field.owning-portfolio-index=10
app.transaction.field.poster-initials-index=11
app.transaction.field.transaction-subtype-index=12
app.transaction.field.cash-effect-index=13
app.transaction.field.old-balance-index=14
app.transaction.field.new-balance-index=15

app.validation.account-number-min-length=5
app.validation.account-number-max-length=20
app.validation.account-number-pattern=^[A-Za-z0-9]{5,20}$

app.status.processing=PROCESSING
app.status.completed=COMPLETED
app.status.failed=FAILED
app.status.partially-completed=PARTIALLY_COMPLETED
app.status.deleted=DELETED
app.status.archived=ARCHIVED

app.error.file-empty=The uploaded file is empty. Please upload a file with content.
app.error.invalid-format=Invalid file format. Only TXT and CSV files are accepted.
app.error.file-too-large=File size exceeds the maximum allowed limit of %d MB
app.error.file-not-found=File not found with ID: %d
app.error.duplicate-file=File '%s' has already been uploaded. Please rename and upload again.
app.error.invalid-file-name=File name is missing or invalid.
app.error.no-file-provided=No file provided. Please select a file to upload.

app.jwt.secret=something-which-will-be-not-thinkable-by-someone-like-me
app.jwt.expiration=3600000